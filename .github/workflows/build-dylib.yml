name: Build DeviceCheckerDylib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest
    
    - name: Build DeviceCheckerDylib
      run: |
        echo "Current directory: $(pwd)"
        echo "List files: $(ls -la)"
        echo "Building DeviceCheckerDylib..."
        xcodebuild -project DeviceChecker.xcodeproj -target DeviceCheckerDylib -configuration Release build -verbose
    
    - name: Find dylib file
      run: |
        echo "Looking for dylib file..."
        find ./build -name "libDeviceCheckerDylib.dylib" -type f
        echo "Build directory contents:"
        ls -la ./build
    
    - name: Upload dylib artifact
      uses: actions/upload-artifact@v4
      with:
        name: libDeviceCheckerDylib
        path: ./build/Release-iphoneos/libDeviceCheckerDylib.dylib